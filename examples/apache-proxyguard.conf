# Apache snippet for ProxyGuard source-IP logging.
# Add it to your eduVPN VirtualHost, then: apache2ctl configtest && systemctl reload apache2
#
# Why this is needed: ProxyGuard tunnels a WireGuard session over TCP/443. To the
# kernel (and to wglogger) those packets appear to come from 127.0.0.1, so the
# client's real public IP is only visible to Apache. The two blocks below expose it:
#   * a START trace line at tunnel setup  -> consumed by proxyguard-watcher.py
#   * a CustomLog line at tunnel teardown -> bytes + duration

# 1) START events: raise the proxy log level ONLY for /proxyguard/ (avoids noise).
LogLevel warn
<LocationMatch "^/proxyguard/">
    LogLevel warn proxy:trace1
</LocationMatch>

# 2) ProxyGuard reverse proxy to local WireGuard (UoTLV = ProxyGuard protocol).
#    Replace vpn.example.org with your server FQDN.
ProxyPassMatch "^/proxyguard/vpn.example.org$" "http://127.0.0.1:51820/" upgrade=UoTLV/1

# 3) END events: structured log written when the HTTP connection closes.
LogFormat "%{%Y-%m-%dT%H:%M:%S%z}t %v apache-proxyguard[%P]: src_ip=%a src_port=%{remote}p method=%m uri=%U%q proto=%H status=%>s dur_us=%D bytes_in=%I bytes_out=%O" proxyguard_fmt
SetEnvIf Request_URI "^/proxyguard/" is_proxyguard
CustomLog /var/log/apache2/proxyguard.log proxyguard_fmt env=is_proxyguard
